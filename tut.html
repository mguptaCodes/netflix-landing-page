<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>pseudo selectors & more designing</title>
        <style>
            .container{
                border: 2px solid red;
                background-color: chartreuse;
                padding: 34px;
                margin: 34px auto;
                width: 666px;
            }
            .btn{
                background-color:rgb(230,25,65);
                padding: 6px;
                border: none;
                cursor: pointer;
                font-size: 13px;
                border-radius: 4px;
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            }
            a{
                text-decoration: none;
                color: black;
            }
            a:hover{
                background-color: blue;
            }
            a:visited{
                background-color: yellow;
            }
            a:active{
                background-color: white;
            }
            .btn:hover{
                color: black;
                background-color: rgb(230,25,65);;

            }
        </style>
</head>
<body>
    <div class="container" id="cont1">
        <h3>This is my heading</h3>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Animi sequi ad obcaecati soluta vero velit veniam itaque blanditiis omnis? Laboriosam officia at omnis, reiciendis corrupti molestiae veritatis ipsam quidem earum, quis deleniti, voluptatibus doloribus?</p>
        <a href="https://google.com" class="btn">Read more</a>
        <button class="btn">Contact us</button>
        
    </div>
</body>
</html>
